<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hue OS</title>
<style>
:root{--bg:#05060a;--panel:#11131a;--line:rgba(255,255,255,.095);--text:#eef1f8;--dim:#8c93a7;--cyan:#66e6ff;--blue:#8d8cff;--amber:#f6c177;--red:#ff6b6b}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:var(--bg);color:var(--text);font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.login{min-height:100vh;display:grid;place-items:center;padding:18px}.loginBox{width:min(420px,100%);border:1px solid var(--line);border-radius:28px;padding:28px;background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.03));box-shadow:0 30px 100px rgba(0,0,0,.5)}h1{margin:0 0 8px;font-size:28px;letter-spacing:-.04em}.sub,.hint{color:var(--dim);font-size:13px;line-height:1.5}.login input{width:100%;height:54px;margin-top:20px;border-radius:18px;border:1px solid var(--line);background:rgba(0,0,0,.28);color:var(--text);font:inherit;font-size:20px;letter-spacing:.16em;text-align:center;outline:none}.login button,.send{height:54px;border:0;border-radius:18px;background:linear-gradient(135deg,var(--cyan),var(--blue));color:#071018;font-weight:850;font-size:15px;cursor:pointer}.login button{width:100%;margin-top:12px}.app{min-height:100vh;display:none;grid-template-rows:auto 1fr auto;width:min(980px,100vw);margin:0 auto;padding:18px}.top{height:56px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line)}.brand{font-size:20px;font-weight:760;letter-spacing:-.04em}.quota{font-size:12px;color:var(--dim)}.messages{height:calc(100vh - 186px);overflow:auto;padding:22px 0;display:flex;flex-direction:column;gap:14px}.msg{max-width:78%;padding:14px 16px;border-radius:20px;white-space:pre-wrap;font-size:15px;line-height:1.55}.msg.user{align-self:flex-end;background:linear-gradient(135deg,var(--blue),#9b8cff);color:white;border-bottom-right-radius:7px}.msg.assistant{align-self:flex-start;background:var(--panel);border:1px solid var(--line);border-bottom-left-radius:7px}.msg.system{align-self:center;max-width:90%;font-size:12px;color:var(--dim);background:transparent;border:1px dashed var(--line)}.msg.loading{align-self:flex-start;width:min(360px,78%);background:var(--panel);border:1px solid var(--line);border-bottom-left-radius:7px}.loadingLabel{font-size:12px;color:var(--dim);margin-bottom:9px}.loadingTrack{height:8px;overflow:hidden;border-radius:999px;background:rgba(255,255,255,.08)}.loadingBar{height:100%;width:45%;border-radius:999px;background:linear-gradient(90deg,var(--cyan),var(--blue));animation:loadingSlide 1.05s infinite ease-in-out}@keyframes loadingSlide{0%{transform:translateX(-110%)}50%{transform:translateX(70%)}100%{transform:translateX(240%)}}.composer{border-top:1px solid var(--line);padding-top:14px}.row{display:grid;grid-template-columns:1fr 104px;gap:10px}.inputWrap{min-height:58px;border:1px solid var(--line);background:rgba(255,255,255,.035);border-radius:20px;display:flex;align-items:center;padding:0 14px}textarea{width:100%;min-height:28px;max-height:140px;resize:none;border:0;outline:0;background:transparent;color:var(--text);font:inherit;font-size:16px;line-height:1.45}button:disabled{cursor:not-allowed;filter:grayscale(.45);opacity:.45}.status{height:24px;margin-top:8px;color:var(--amber);font-size:12px}.status.err{color:var(--red)}@media(max-width:640px){.app{padding:12px}.msg{max-width:92%}.row{grid-template-columns:1fr 78px}.quota{display:none}}
</style>
</head>
<body>
<section class="login" id="loginView"><form class="loginBox" id="login"><h1>Hue OS</h1><div class="sub">4자리 접속 비밀번호를 입력하면 자동 로그인됩니다.</div><input id="password" type="password" inputmode="numeric" autocomplete="current-password" placeholder="••••" maxlength="4" pattern="[0-9]{4}" autofocus><button id="loginBtn" type="submit">Enter</button><div class="status err" id="loginErr"></div><div class="hint">IP별 하루 200회 대화 제한. 00:00 초기화.</div></form></section>
<main class="app" id="app"><header class="top"><div class="brand">Hue OS</div><div class="quota" id="quota">loading quota...</div></header><section class="messages" id="messages"><div class="msg assistant">응. 준비됐어.<br>Hue OS는 실제 작업 실행용이 아니라 질의응답용 개인 미러야.<br>네가 준 정보 안에서만 짧게 답할게. 답변 중 취소는 Esc.</div></section><footer class="composer"><div class="row"><div class="inputWrap"><textarea id="input" placeholder="메시지 입력..."></textarea></div><button class="send" id="send">Send</button></div><div class="status" id="status">Enter 전송 · Shift+Enter 줄바꿈 · Esc 답변 취소</div></footer></main>
<script>
let messages=[];let inFlight=null;const SERVICE_STOPPED_TEXT='서비스 중지상태입니다. 로컬 터미널 연결이 닫혀 있어요.';const loginView=document.getElementById('loginView');const app=document.getElementById('app');const box=document.getElementById('messages');const input=document.getElementById('input');const sendBtn=document.getElementById('send');const statusEl=document.getElementById('status');const quotaEl=document.getElementById('quota');function renderMessage(role,content){const el=document.createElement('div');el.className='msg '+role;el.textContent=content;box.appendChild(el);box.scrollTop=box.scrollHeight;}function addLoading(){const el=document.createElement('div');el.className='msg loading';el.innerHTML='<div class="loadingLabel">Hue OS가 답변 중...</div><div class="loadingTrack"><div class="loadingBar"></div></div>';box.appendChild(el);box.scrollTop=box.scrollHeight;return el;}function busy(on){sendBtn.disabled=on;input.disabled=on;sendBtn.textContent=on?'...':'Send'}function updateQuota(q){if(q)quotaEl.textContent='오늘 '+q.used+'/'+q.limit+' · 남은 '+q.remaining;}async function readJson(res){try{return await res.json();}catch(_){return {};}}function isServiceStopped(res,data){const error=String(data&&data.error||'');return Boolean(data&&data.serviceStopped)||res.status>=500||error==='service_stopped'||error.includes('local_hue_os_unreachable');}function showLoginServiceStopped(){loginView.style.display='grid';app.style.display='none';loginErr.textContent=SERVICE_STOPPED_TEXT;}function showChatServiceStopped(){renderMessage('system',SERVICE_STOPPED_TEXT);statusEl.textContent='서비스 중지상태';statusEl.className='status err';}async function profile(){try{const res=await fetch('/api/hue-os/profile');const data=await readJson(res);if(res.status===401){loginView.style.display='grid';app.style.display='none';return;}if(isServiceStopped(res,data)){showLoginServiceStopped();return;}loginView.style.display='none';app.style.display='grid';updateQuota(data.quota);input.focus();}catch(_){showLoginServiceStopped();}}const loginForm=document.getElementById('login');const passwordEl=document.getElementById('password');const loginBtn=document.getElementById('loginBtn');const loginErr=document.getElementById('loginErr');let loginBusy=false;function setLoginBusy(on){loginBusy=on;loginBtn.disabled=on;loginBtn.textContent=on?'로그인중...':'Enter';}async function submitLogin(e){if(e)e.preventDefault();if(loginBusy)return;const password=passwordEl.value.trim();if(password.length<4)return;setLoginBusy(true);loginErr.textContent='로그인 중...';try{const res=await fetch('/api/hue-os/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password})});const data=await readJson(res);if(isServiceStopped(res,data)){showLoginServiceStopped();return;}if(!res.ok||!data.ok){loginErr.textContent='비밀번호가 맞지 않습니다.';passwordEl.select();return;}profile();}catch(_){showLoginServiceStopped();}finally{setLoginBusy(false);}}loginForm.addEventListener('submit',submitLogin);passwordEl.addEventListener('input',()=>{passwordEl.value=passwordEl.value.replace(/\D/g,'').slice(0,4);loginErr.textContent='';if(passwordEl.value.length===4)submitLogin();});async function send(){if(inFlight)return;const text=input.value.trim();if(!text)return;input.value='';messages.push({role:'user',content:text});renderMessage('user',text);const loading=addLoading();const controller=new AbortController();inFlight=controller;busy(true);statusEl.textContent='thinking... Esc로 취소';statusEl.className='status';try{const res=await fetch('/api/hue-os/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:text,messages}),signal:controller.signal});const data=await readJson(res);loading.remove();if(isServiceStopped(res,data)){showChatServiceStopped();updateQuota(data.quota);return;}if(!res.ok){renderMessage('system',data.error||'요청 실패');statusEl.textContent=data.error||'error';statusEl.className='status err';updateQuota(data.quota);return;}const answer=data.answer||'응답 없음';if(data.serviceStopped){showChatServiceStopped();return;}messages.push({role:'assistant',content:answer});renderMessage('assistant',answer);updateQuota(data.quota);statusEl.textContent=data.mode?'mode: '+data.mode:'done';}catch(e){loading.remove();if(e.name==='AbortError'){renderMessage('system','답변을 취소했습니다.');statusEl.textContent='cancelled';}else{showChatServiceStopped();}}finally{inFlight=null;busy(false);input.focus();}}sendBtn.addEventListener('click',send);input.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}});document.addEventListener('keydown',e=>{if(e.key==='Escape'&&inFlight)inFlight.abort();});profile();
</script>
</body>
</html>
